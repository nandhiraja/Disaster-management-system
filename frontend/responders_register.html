<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responder Registration – Join the Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050510;
            --card: #121225;
            --text: #ffffff;
            --muted: #a0a0b0;
            --accent: #0088ff;
            --green: #00ff88;
            --gov: #ffcc00;
            --ngo: #ff9f00;
            --cert: #aa00ff;
            --local: #00ffcc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--muted);
        }

        /* Tier Selection */
        .tier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .tier-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tier-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .tier-card.active {
            border-width: 2px;
        }

        .tier-gov.active {
            border-color: var(--gov);
            background: rgba(255, 204, 0, 0.05);
        }

        .tier-ngo.active {
            border-color: var(--ngo);
            background: rgba(255, 159, 0, 0.05);
        }

        .tier-cert.active {
            border-color: var(--cert);
            background: rgba(170, 0, 255, 0.1);
        }

        .tier-local.active {
            border-color: var(--local);
            background: rgba(0, 255, 204, 0.05);
        }

        .tier-card .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .tier-card h3 {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .tier-card .trust {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 800;
        }

        /* Form Area */
        #form-container {
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--muted);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .checkbox-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .checkbox-item input {
            width: auto;
        }

        /* GPS Widget */
        .gps-widget {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-top: 10px;
        }

        .gps-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .acc-pill {
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 100px;
        }

        .btn-register {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-register:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Success Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            z-index: 100;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Join the Rescue Network</h1>
            <p class="subtitle">Select your role and provide details to be integrated into the state disaster response
                grid.</p>
        </header>

        <div class="tier-grid">
            <div class="tier-card tier-gov" onclick="selectTier(this, 'government')">
                <span class="icon">🛡️</span>
                <h3>Govt Team</h3>
                <div class="trust">TRUST 100</div>
            </div>
            <div class="tier-card tier-ngo" onclick="selectTier(this, 'ngo')">
                <span class="icon">🏥</span>
                <h3>NGO Team</h3>
                <div class="trust">TRUST 80</div>
            </div>
            <div class="tier-card tier-cert" onclick="selectTier(this, 'certified_volunteer')">
                <span class="icon">🎓</span>
                <h3>Certified</h3>
                <div class="trust">TRUST 60</div>
            </div>
            <div class="tier-card tier-local" onclick="selectTier(this, 'local_volunteer')">
                <span class="icon">🙋</span>
                <h3>Local</h3>
                <div class="trust">TRUST 40</div>
            </div>
        </div>

        <!-- Dynamic Form Container -->
        <div id="form-container">
            <h2 id="form-title"
                style="margin-bottom: 25px; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">Form</h2>
            <form id="reg-form">
                <input type="hidden" id="field-tier" name="tier">

                <div id="common-fields">
                    <div class="form-group">
                        <label id="lbl-name">Full Name</label>
                        <input type="text" id="field-name" required placeholder="Enter name">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="field-phone" required placeholder="+91 XXXX XXXX XX">
                    </div>
                </div>

                <!-- Tier Specific Fields -->
                <div id="tier-specific"></div>

                <div class="form-group">
                    <label>Skills & Capabilities</label>
                    <div class="checkbox-grid">
                        <label class="checkbox-item"><input type="checkbox" name="skill" value="swimming">
                            Swimming</label>
                        <label class="checkbox-item"><input type="checkbox" name="skill" value="first_aid"> First
                            Aid</label>
                        <label class="checkbox-item"><input type="checkbox" name="skill" value="boat_driving"> Boat
                            Driving</label>
                        <label class="checkbox-item"><input type="checkbox" name="skill" value="medical">
                            Medical/Doctor</label>
                        <label class="checkbox-item"><input type="checkbox" name="skill" value="climbing">
                            Rescue/Climbing</label>
                        <label class="checkbox-item"><input type="checkbox" name="skill" value="heavy_vehicle"> Heavy
                            Vehicle</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Current/Base Location</label>
                    <div class="gps-widget">
                        <div class="gps-row">
                            <span id="gps-status" style="font-size: 0.85rem; color: var(--muted);">Waiting for
                                GPS...</span>
                            <span id="gps-acc" class="acc-pill">±? m</span>
                        </div>
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="btn-register">REGISTER AS RESPONDER</button>
            </form>
        </div>
    </div>

    <div id="success-overlay" class="overlay">
        <div style="font-size: 4rem; margin-bottom: 20px;">🎉</div>
        <h1 id="success-title">Registration Successful!</h1>
        <p id="success-msg" style="color: var(--muted); line-height: 1.6; margin-bottom: 30px;"></p>
        <a href="index.html" class="btn-register" style="text-decoration: none; display: inline-block;">GO TO
            LANDING</a>
    </div>

    <script src="js/api.js"></script>
    <script>
        let selectedTier = '';
        let gps = { lat: null, lon: null, acc: null };

        // GPS Watch
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                gps.lat = pos.coords.latitude;
                gps.lon = pos.coords.longitude;
                gps.acc = pos.coords.accuracy;
                const status = document.getElementById('gps-status');
                const acc = document.getElementById('gps-acc');
                status.textContent = "📍 GPS Fixed";
                acc.textContent = "±" + Math.round(gps.acc) + " m";
                acc.style.background = gps.acc <= 20 ? '#007744' : gps.acc <= 50 ? '#aa7700' : '#770000';
            }, err => {
                document.getElementById('gps-status').textContent = "⚠️ GPS denied or failed";
            }, { enableHighAccuracy: true });
        }

        function selectTier(el, tier) {
            // UI
            document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');

            // Logic
            selectedTier = tier;
            document.getElementById('field-tier').value = tier;
            document.getElementById('form-container').style.display = 'block';

            const colors = { government: '#ffcc00', ngo: '#ff9f00', certified_volunteer: '#aa00ff', local_volunteer: '#00ffcc' };
            const accent = colors[tier];
            document.getElementById('btn-register'); // not used
            document.documentElement.style.setProperty('--accent', accent);

            // Update Labels & Fields
            const titles = {
                government: '🛡️ Government Rescue Form',
                ngo: '🏥 NGO Team Registration',
                certified_volunteer: '🎓 Certified Volunteer Form',
                local_volunteer: '🙋 Local Volunteer Quick-Sign'
            };
            document.getElementById('form-title').textContent = titles[tier];
            document.getElementById('lbl-name').textContent = tier.includes('team') || tier.includes('ngo') ? 'Team/Org Name' : 'Full Name';

            // Render Tier-Specific Fields
            const specific = document.getElementById('tier-specific');
            let html = '';
            if (tier === 'government') {
                html = `
                <div class="form-group"><label>Department Name</label><input type="text" id="f-dept" placeholder="e.g. NDRF, Fire Dept"></div>
                <div class="form-group"><label>Team Leader Name</label><input type="text" id="f-leader"></div>
                <div class="form-group"><label>Team Size</label><input type="number" id="f-size" value="5"></div>
                <div class="form-group"><label>Operating Radius (km)</label><input type="number" id="f-radius" value="20"></div>
                <div class="form-group"><label>Team ID / Badge #</label><input type="text" id="f-badge"></div>
            `;
            } else if (tier === 'ngo') {
                html = `
                <div class="form-group"><label>Organization Name</label><input type="text" id="f-org" placeholder="e.g. Red Cross"></div>
                <div class="form-group"><label>Registration Number</label><input type="text" id="f-reg"></div>
                <div class="form-group"><label>Contact Person</label><input type="text" id="f-contact"></div>
                <div class="form-group"><label>Team Size</label><input type="number" id="f-size" value="10"></div>
                <div class="form-group"><label>Operating Area</label><input type="text" id="f-area" placeholder="e.g. South Chennai"></div>
            `;
            } else if (tier === 'local_volunteer') {
                html = `<div class="form-group"><label>Village/Area</label><input type="text" id="f-village" placeholder="e.g. Tambaram"></div>`;
            }
            specific.innerHTML = html;

            // Scroll to form
            document.getElementById('form-container').scrollIntoView({ behavior: 'smooth' });
        }

        document.getElementById('reg-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const skills = Array.from(document.querySelectorAll('input[name="skill"]:checked')).map(cb => cb.value);

            const data = {
                name: document.getElementById('field-name').value || document.getElementById('f-org')?.value || document.getElementById('f-dept')?.value,
                phone: document.getElementById('field-phone').value,
                type: selectedTier.includes('gov') ? 'volunteer' : 'volunteer',
                tier: selectedTier,
                lat: gps.lat,
                lon: gps.lon,
                gps_accuracy: gps.acc,
                skills: skills,
                district: document.getElementById('f-village')?.value || document.getElementById('f-area')?.value || 'Chennai',
                department: document.getElementById('f-dept')?.value,
                team_leader_name: document.getElementById('f-leader')?.value || document.getElementById('f-contact')?.value,
                team_size: parseInt(document.getElementById('f-size')?.value || 1),
                operating_radius: parseFloat(document.getElementById('f-radius')?.value || 10.0),
                registration_number: document.getElementById('f-reg')?.value || document.getElementById('f-badge')?.value
            };

            // Special rule: if it's a boat team, set type to boat
            if (skills.includes('boat_driving')) data.type = 'boat';

            try {
                const res = await fetch(`${API}/responders/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    document.getElementById('success-msg').textContent =
                        selectedTier === 'local_volunteer'
                            ? "You are now active! You can login to the Volunteer App immediately."
                            : "Your credentials have been submitted. An officer will verify your documents shortly.";
                    document.getElementById('success-overlay').style.display = 'flex';
                } else {
                    alert(result.detail);
                }
            } catch (err) { alert("Network Error"); }
        });
    </script>

</body>

</html>
